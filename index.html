<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Should I Text My Ex?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lilita One', 'Bubblegum Sans', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px 10px;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #5E2DFF, #4DD0FF, #1DE9B6);
            color: #fff;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin: 10px 0;
            text-shadow: 2px 2px rgba(0,0,0,0.3);
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            z-index: 2;
            width: 100%;
            max-width: 400px;
        }

        label {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin: 8px 0 4px;
        }

        input[type="range"] {
            width: 80%;
            max-width: 300px;
            height: 14px;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            margin-bottom: 8px;
            background: linear-gradient(to right, #4DD0FF, #1DE9B6);
        }

        #alcohol-text, #breakup-text {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: 8px;
        }

        .time-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .time-options button {
            margin: 0;
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            background-color: #BDA2FF;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            transition: transform 0.2s, background-color 0.2s;
        }

        .time-options button.active {
            background-color: #1DE9B6;
            transform: scale(1.1);
        }

        #submit-btn {
            margin-top: 10px;
            padding: 12px 24px;
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            font-weight: bold;
            border-radius: 25px;
            border: none;
            background-color: #4DD0FF;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        #submit-btn:hover { transform: scale(1.1); }

        #response-box {
            position: relative;
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
            min-height: 180px;
            background-color: rgba(255, 182, 193, 0.85);
            border: 6px solid #BDA2FF;
            border-radius: 25px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
            z-index: 3;
            padding: 20px;
            margin-bottom: 30px;
        }

        #response-box.show {
            opacity: 1;
            transform: scale(1);
        }

        #response-text {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            margin: 0;
            padding: 12px;
            z-index: 2;
            position: relative;
            font-weight: bold;
            text-align: center;
            text-shadow: 1px 1px rgba(0,0,0,0.2);
            background-color: rgba(189, 162, 255, 0.5);
            border-radius: 15px;
        }

        .bg-icon {
            position: fixed;
            opacity: 0.5;
            pointer-events: none;
            animation: floatBack 3s ease-in-out infinite alternate;
            transition: opacity 0.3s ease;
            object-fit: contain;
        }

        @keyframes floatBack {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

<h1>Should I Text My Ex?</h1>

<div class="controls">
    <label for="breakup">Time Since Breakup (days)</label>
    <input type="range" id="breakup" min="0" max="730" value="30">
    <div id="breakup-text">30 days</div>

    <label for="alcohol">Alcohol Level</label>
    <input type="range" id="alcohol" min="0" max="3" value="0">
    <div id="alcohol-text">🧃 Sober</div>

    <label>Time of Day</label>
    <div class="time-options">
        <button data-time="day" class="time-btn active">🌞 Morning</button>
        <button data-time="evening" class="time-btn">🌙 Evening</button>
        <button data-time="night" class="time-btn">🌚 Late Night</button>
    </div>

    <button id="submit-btn">Should I Text?</button>
</div>

<!-- Response Box -->
<div id="response-box">
    <p id="response-text"></p>
</div>

<!-- Background icons -->
<div id="background-icons"></div>

<script>
    const alcoholSlider = document.getElementById('alcohol');
    const alcoholLabel = document.getElementById('alcohol-text');
    const alcoholTextArr = ["🧃 Sober", "🍷 One drink", "🍸 Tipsy", "🥴 I miss them"];
    alcoholSlider.addEventListener('input', () => {
        alcoholLabel.textContent = alcoholTextArr[alcoholSlider.value];
    });

    const breakupSlider = document.getElementById('breakup');
    const breakupText = document.getElementById('breakup-text');
    breakupSlider.addEventListener('input', () => {
        breakupText.textContent = breakupSlider.value + " days";
    });

    let selectedTime = "day";
    const timeButtons = document.querySelectorAll('.time-btn');
    timeButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            timeButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedTime = btn.dataset.time;
        });
    });

    // Background floating icons - adaptive grid
    const defaultBgIcons = ["bg1.PNG", "bg2.PNG", "bg3.PNG"];
    const bgContainer = document.getElementById('background-icons');
    const bgImages = [];

    function createBgIcons() {
        // Clear existing
        bgContainer.innerHTML = '';
        bgImages.length = 0;

        const screenW = window.innerWidth;
        const screenH = window.innerHeight;

        // Adapt icon size and grid to screen
        let iconSize, cols, rows;
        if (screenW < 480) {
            iconSize = 45;
            cols = 4;
            rows = 5;
        } else if (screenW < 768) {
            iconSize = 60;
            cols = 5;
            rows = 5;
        } else {
            iconSize = 85;
            cols = 6;
            rows = 5;
        }

        const cellW = screenW / cols;
        const cellH = screenH / rows;

        // Build shuffled positions
        const positions = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                positions.push({ r, c });
            }
        }
        for (let i = positions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [positions[i], positions[j]] = [positions[j], positions[i]];
        }

        positions.forEach((pos, idx) => {
            const img = document.createElement('img');
            img.src = defaultBgIcons[idx % defaultBgIcons.length];
            img.className = "bg-icon";
            img.style.width = iconSize + "px";
            img.style.height = iconSize + "px";
            img.style.top = (pos.r * cellH + (cellH - iconSize) / 2) + "px";
            img.style.left = (pos.c * cellW + (cellW - iconSize) / 2) + "px";
            img.style.animationDelay = (idx * 0.5) + "s";
            img.onerror = function() { this.style.display = 'none'; };
            bgContainer.appendChild(img);
            bgImages.push(img);
        });
    }

    // Create on load and resize
    createBgIcons();

    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(createBgIcons, 250);
    });

    const responseBox = document.getElementById('response-box');
    const responseText = document.getElementById('response-text');

    function showResponse(message, iconSrc) {
        responseText.textContent = message;

        // Swap all background icons to the response icon with a fade
        bgImages.forEach((img, i) => {
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = iconSrc;
                img.onerror = function() { this.style.display = 'none'; };
                img.style.display = '';
                img.style.opacity = '0.5';
            }, 150 + i * 30);
        });

        responseBox.classList.add('show');
    }

    // Button click logic
    document.getElementById('submit-btn').addEventListener('click', () => {
        const days = parseInt(breakupSlider.value);
        const alcohol = parseInt(alcoholSlider.value);
        let message = "", iconSrc = "";

        let score = 0;
        score += alcohol * 10;

        if (selectedTime === "night") score += 25;
        else if (selectedTime === "evening") score += 12;

        if (days < 7) score += 30;
        else if (days < 30) score += 25;
        else if (days < 90) score += 18;
        else if (days < 180) score += 10;
        else if (days < 365) score += 5;

        if (alcohol >= 2 && selectedTime === "night") score += 15;
        if (days < 30 && alcohol >= 1) score += 10;
        if (days < 7 && selectedTime === "night") score += 10;

        if (score >= 70) {
            message = "🚨 ABSOLUTELY NOT. This is a code red. Put the phone in the freezer.";
            iconSrc = "toxic.PNG";
        } else if (score >= 55) {
            message = "☠️ Terrible idea. You're drunk, it's late, and this will end badly.";
            iconSrc = "toxic.PNG";
        } else if (score >= 45) {
            message = "🚩 Major red flags. Your future self is begging you to stop.";
            iconSrc = "redflag.PNG";
        } else if (score >= 35) {
            message = "👻 This has '2am regret' written all over it. Sleep on it.";
            iconSrc = "ghost.PNG";
        } else if (score >= 25) {
            message = "🧠❤️ Your brain says no, your heart says yes… probably still a no.";
            iconSrc = "brainheart.PNG";
        } else if (score >= 15) {
            message = "🍷 Hmm… it's risky. Maybe write it out but don't hit send yet.";
            iconSrc = "wine.PNG";
        } else if (score >= 5) {
            message = "🤔 Okay maybe… but keep it casual. No essays. No love poems.";
            iconSrc = "brainheart.PNG";
        } else {
            message = "✅ You're sober, it's daytime, and it's been ages. Go for it… carefully.";
            iconSrc = "wine.PNG";
        }

        showResponse(message, iconSrc);
    });
</script>
</body>
</html>
